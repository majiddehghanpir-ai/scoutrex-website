<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SR Logo Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
body{background:#0D0B1F;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;gap:48px;padding:48px}
.row{display:flex;align-items:center;gap:32px;flex-wrap:wrap;justify-content:center}
.swatch{display:flex;flex-direction:column;align-items:center;gap:10px}
.swatch span{font-size:11px;color:#8885a8;letter-spacing:1px}
.on-dark{background:#0D0B1F;padding:20px;border-radius:12px;border:1px solid rgba(255,255,255,.08)}
.on-white{background:#fff;padding:20px;border-radius:12px}
.on-indigo{background:#1E1256;padding:20px;border-radius:12px}
.label{color:#F97316;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}

/* Full navbar lockup */
.nav-lockup{display:flex;align-items:center;gap:10px}
.logo-wordmark{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#fff;letter-spacing:-.3px}
.logo-rex{color:#F97316}
</style>
</head>
<body>

<div class="label">SR Mark, Size Scale</div>
<div class="row">

      <svg viewBox="0 0 40 40" fill="none" width="16" height="16">

        <path d="M20,25 C12,25 4,30 5,35 C6,39 18,40 27,38 C33,36 33,30 30,25" stroke="#F97316" stroke-width="7" fill="none" stroke-linecap="round"/>

    </div>
    <span>16px</span>
  </div>

</html>
