<script>
// Click to enlarge
document.querySelectorAll('.cell').forEach(cell => {
  cell.addEventListener('click', () => {
    const existing = document.getElementById('overlay');
    if(existing) existing.remove();
    const svg = cell.querySelector('svg').cloneNode(true);
    const num = cell.querySelector('.num').textContent;
    const overlay = document.createElement('div');
    overlay.id = 'overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;cursor:pointer';
    svg.style.cssText = 'width:260px;height:260px';
    const label = document.createElement('div');
    label.textContent = '#' + num;
    label.style.cssText = 'color:#F97316;font-size:22px;font-weight:700;margin-top:24px;font-family:Inter,sans-serif';
    const hint = document.createElement('div');
    hint.textContent = 'Click anywhere to close';
    hint.style.cssText = 'color:rgba(255,255,255,0.3);font-size:12px;margin-top:8px;font-family:Inter,sans-serif';
    overlay.appendChild(svg);
    overlay.appendChild(label);
    overlay.appendChild(hint);
    overlay.addEventListener('click', () => overlay.remove());
    document.body.appendChild(overlay);
  });
});
</script>
